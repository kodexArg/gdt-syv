        function: "Subjefe Especialista, líder equipo Scout"
      members:
        - rank: "Soldado"
          level: 1
          function: "Tirador Sniper"
        - rank: "Soldado"
          level: 1
          function: "Observador"
        - rank: "Soldado"
          level: 1
          function: "Fusilero de protección"
          cantidad: 2

  direct_members:

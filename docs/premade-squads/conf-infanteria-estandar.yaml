    # de la escuadra (fuera de grupo), bajo el Sargento. Es L1 con radio global según ADR-009.
    # El manual/04b ya la listaba en la composición; el YAML la omitía — discrepancia cerrada.
    - rank: "Soldado de Comunicaciones"
      level: 1
      function: "Porta radio global; amplifica el rango del Sargento en la cadena de mando"
      has_radio_global: true
